<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Python GUI Runner Simulator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

background:
linear-gradient(
135deg,
#050b18,
#071626,
#101827
);

color:white;

padding:25px;

}

.title{

text-align:center;

font-size:42px;

margin-bottom:20px;

color:#00f5ff;

}

.main{

display:grid;

grid-template-columns:
1fr 1fr;

gap:20px;

}

.card{

background:
rgba(255,255,255,.05);

padding:20px;

border-radius:20px;

}

.controls{

display:flex;

flex-wrap:wrap;

gap:10px;

margin-bottom:20px;

}

button{

padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:15px;

background:
linear-gradient(
90deg,
#00d4ff,
#0077ff
);

color:white;

}

.preview{

background:#e9edf3;

height:520px;

border-radius:15px;

padding:20px;

overflow:auto;

}

.window{

background:white;

min-height:450px;

padding:20px;

border-radius:15px;

color:black;

}

.label{

margin:12px 0;

font-size:18px;

}

.input{

width:100%;

padding:12px;

margin:10px 0;

}

.realbtn{

padding:12px 18px;

margin:10px 0;

}

.output{

margin-top:15px;

background:black;

padding:15px;

height:120px;

overflow:auto;

color:#00ff88;

border-radius:10px;

}

.code{

background:black;

color:#00ff88;

padding:20px;

height:660px;

overflow:auto;

border-radius:15px;

white-space:pre-wrap;

}

</style>

</head>

<body>

<div class="title">

🪟 Python GUI Program Runner

</div>


<div class="main">

<div class="card">

<div class="controls">

<button onclick="addLabel()">
Add Label
</button>

<button onclick="addInput()">
Add Input
</button>

<button onclick="addButton()">
Add Button
</button>

<button onclick="runGUI()">
▶ Run GUI
</button>

<button onclick="resetGUI()">
Reset
</button>

</div>


<div class="preview">

<div
id="app"
class="window">

<h2>

Python GUI Window

</h2>

</div>

</div>


<div
id="console"
class="output">

Ready...

</div>

</div>



<div class="card">

<h2>

Generated Python Tkinter Code

</h2>

<div
id="code"
class="code">

import tkinter as tk

root=tk.Tk()

root.mainloop()

</div>

</div>

</div>



<script>

let widgets=[]

function updateCode(){

let py=

`import tkinter as tk

root=tk.Tk()

root.title("Generated GUI")

`

widgets.forEach(x=>{

if(x==="label"){

py+=

`
label=tk.Label(
root,
text="Hello"
)

label.pack()

`

}

if(x==="input"){

py+=

`
entry=tk.Entry(
root
)

entry.pack()

`

}

if(x==="button"){

py+=

`
button=tk.Button(
root,
text="Click"
)

button.pack()

`

}

})

py+=

`
root.mainloop()
`

code.innerText=py

}



function addLabel(){

app.innerHTML+=

`
<div class="label">
Hello GUI
</div>
`

widgets.push(
"label"
)

updateCode()

}



function addInput(){

app.innerHTML+=

`
<input
class="input"
placeholder="Enter Text">
`

widgets.push(
"input"
)

updateCode()

}



function addButton(){

app.innerHTML+=

`
<button
class="realbtn"
onclick="
document.getElementById(
'console'
).innerHTML=
'Button Executed'
">

Click

</button>
`

widgets.push(
"button"
)

updateCode()

}



function runGUI(){

console.innerHTML=

`
▶ Running Python GUI...
<br><br>
✔ Window Loaded
`

app.style.transform=
"scale(1.02)"

setTimeout(()=>{

app.style.transform=
"scale(1)"

},300)

}



function resetGUI(){

widgets=[]

app.innerHTML=

`
<h2>

Python GUI Window

</h2>
`

console.innerHTML=

"Ready..."

updateCode()

}



updateCode()

</script>

</body>

</html>
